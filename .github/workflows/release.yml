name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            exe_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            exe_ext: ".exe"
          - os: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            exe_ext: ""
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            exe_ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          BIN_NAME="livesync-agent"
          VERSION="${GITHUB_REF_NAME}"
          TARGET="${{ matrix.target }}"
          EXE_EXT="${{ matrix.exe_ext }}"
          ARCHIVE_EXT="${{ matrix.archive_ext }}"
          ASSET_BASE="${BIN_NAME}-${VERSION}-${TARGET}"

          mkdir -p dist
          cp "target/${TARGET}/release/${BIN_NAME}${EXE_EXT}" "dist/${BIN_NAME}${EXE_EXT}"

          if [[ "$ARCHIVE_EXT" == "zip" ]]; then
            (cd dist && 7z a -tzip "${ASSET_BASE}.zip" "${BIN_NAME}${EXE_EXT}" >/dev/null)
            rm -f "dist/${BIN_NAME}${EXE_EXT}"
            (cd dist && sha256sum "${ASSET_BASE}.zip" > "${ASSET_BASE}.sha256")
          else
            tar -C dist -czf "dist/${ASSET_BASE}.tar.gz" "${BIN_NAME}${EXE_EXT}"
            rm -f "dist/${BIN_NAME}${EXE_EXT}"
            (cd dist && shasum -a 256 "${ASSET_BASE}.tar.gz" | awk '{print $1"  "$2}' > "${ASSET_BASE}.sha256")
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Build checksums file
        run: |
          set -euo pipefail
          cd dist
          cat *.sha256 > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
